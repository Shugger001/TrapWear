services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trapwear
      POSTGRES_PASSWORD: trapwear
      POSTGRES_DB: trapwear
    volumes:
      - trapwear_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  trapwear_pg:
